<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Nadzor LED</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #dfe9f3, #ffffff);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .kartica {
            background: #ffffff;
            width: 100%;
            max-width: 420px;
            border-radius: 20px;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.15);
            padding: 30px 25px;
            text-align: center;
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 30px;
            color: #1f3c88;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 18px;
            font-weight: normal;
            color: #5d6d7e;
        }

        .opis {
            font-size: 15px;
            margin-bottom: 25px;
            color: #555;
            line-height: 1.5;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #f4f6f8;
            border-radius: 12px;
            padding: 12px 18px;
            margin-bottom: 25px;
            font-size: 16px;
            font-weight: bold;
        }

        .indikator {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background-color: #bdc3c7;
            box-shadow: 0 0 8px rgba(0, 0, 0, 0.2);
        }

        .indikator.vklop {
            background-color: #2ecc71;
            box-shadow: 0 0 12px rgba(46, 204, 113, 0.8);
        }

        .indikator.izklop {
            background-color: #e74c3c;
            box-shadow: 0 0 12px rgba(231, 76, 60, 0.8);
        }

        .gumbi {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .gumb {
            display: block;
            text-decoration: none;
            color: white;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 20px;
            border-radius: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .gumb:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
            opacity: 0.95;
        }

        .vklop {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
        }

        .izklop {
            background: linear-gradient(135deg, #c0392b, #e74c3c);
        }

        .noga {
            margin-top: 25px;
            font-size: 13px;
            color: #7f8c8d;
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 26px;
            }

            .gumb {
                font-size: 18px;
                padding: 14px 18px;
            }
        }
    </style>
</head>
<body>
    <div class="kartica">
        <h1>ESP32 nadzor LED</h1>
        <h2>Spletni uporabniški vmesnik</h2>

        <p class="opis">
            Preko spodnjih gumbov lahko vklopite ali izklopite LED diodo, povezano z razvojno ploščico ESP32.
        </p>

        <div class="status">
            <span class="indikator izklop"></span>
            <span>Status LED: IZKLOPLJENA</span>
        </div>

        <div class="gumbi">
            <a class="gumb vklop" href="/1">Prižgi LED</a>
            <a class="gumb izklop" href="/0">Ugasni LED</a>
        </div>

        <div class="noga">
            HTTP strežnik na ESP32 deluje pravilno.
        </div>
    </div>
</body>
</html>
